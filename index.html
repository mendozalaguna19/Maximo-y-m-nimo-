<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Inventario Avanzada</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            max-width: 750px; /* Un poco más ancho para que quepa la tabla expandida */
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: auto;
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .flex-group {
            display: flex;
            gap: 15px;
        }
        .flex-group .form-group {
            flex: 1;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="number"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .part-number-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            background: #f9f9f9;
            padding: 8px;
            border-radius: 4px;
            border-left: 4px solid #3498db;
        }
        .part-number-row label {
            margin-bottom: 0;
            flex: 1;
        }
        .part-number-row input {
            width: 120px;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background-color: #2980b9;
        }
        #resultados {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4f8;
            border-radius: 4px;
            display: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }
        table, th, td {
            border: 1px solid #bdc3c7;
        }
        th, td {
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        .badge-min {
            background-color: #e74c3c;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
        .badge-max {
            background-color: #27ae60;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Inventario por Familias (Máx / Mín)</h2>
    
    <div class="flex-group">
        <div class="form-group">
            <label for="ordenesSemanales">Órdenes solicitadas (Semana):</label>
            <input type="number" id="ordenesSemanales" value="10" min="0">
        </div>
        
        <div class="form-group">
            <label for="tiempoPorOrden">Tiempo por Orden (Horas):</label>
            <input type="number" id="tiempoPorOrden" value="2" min="0" step="0.1">
        </div>
    </div>

    <div class="form-group">
        <label for="familiaSelect">Seleccione la Familia de Materiales:</label>
        <select id="familiaSelect" onchange="cargarPartNumbers()">
            <option value="">-- Seleccione una opción --</option>
            <option value="mirror">Mirror</option>
            <option value="emires">Emires</option> </select>
    </div>

    <div id="contenedorPartNumbers"></div>

    <div class="form-group" style="margin-top: 20px;">
        <button type="button" onclick="calcularNiveles()">Calcular Niveles y Tiempos Totales</button>
    </div>

    <div id="resultados">
        <h3>Reporte de Control de Inventario</h3>
        <p id="resumenOrdenes"></p>
        <p id="resumenTiempos" style="font-weight: bold; color: #2c3e50;"></p>
        
        <table>
            <thead>
                <tr>
                    <th>Part Number</th>
                    <th>Cant. x Orden</th>
                    <th>Demanda Total</th>
                    <th>Stock Mínimo <br><small>(3 Órdenes)</small></th>
                    <th>Stock Máximo <br><small>(6 Órdenes)</small></th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo">
            </tbody>
        </table>
    </div>
</div>

<script>
// BASE DE DATOS: Añadí la familia Emires con los 17 números de parte
const baseDatosFamilias = {
    mirror: [
        "PN-M01", "PN-M02", "PN-M03", "PN-M04", "PN-M05", 
        "PN-M06", "PN-M07", "PN-M08", "PN-M09", "PN-M10", 
        "PN-M11", "PN-M12", "PN-M13", "PN-M14", "PN-M15", 
        "PN-M16", "PN-M17"
    ],
    emires: [
        "PN-E01", "PN-E02", "PN-E03", "PN-E04", "PN-E05", 
        "PN-E06", "PN-E07", "PN-E08", "PN-E09", "PN-E10", 
        "PN-E11", "PN-E12", "PN-E13", "PN-E14", "PN-E15", 
        "PN-E16", "PN-E17"
    ]
};

function cargarPartNumbers() {
    const familiaSeleccionada = document.getElementById("familiaSelect").value;
    const contenedor = document.getElementById("contenedorPartNumbers");
    
    contenedor.innerHTML = "";
    document.getElementById("resultados").style.display = "none";

    if (!familiaSeleccionada || !baseDatosFamilias[familiaSeleccionada]) return;

    const listaPN = baseDatosFamilias[familiaSeleccionada];
    
    let htmlContenido = `<h3>Componentes de la Familia: ${familiaSeleccionada.toUpperCase()}</h3>`;
    htmlContenido += `<p style="font-size:13px; color:#7f8c8d;">Ingrese la cantidad estándar que consume <b>UNA SOLA orden</b> para cada número de parte:</p>`;

    listaPN.forEach(pn => {
        htmlContenido += `
            <div class="part-number-row">
                <label for="input_${pn}">${pn}:</label>
                <input type="number" id="input_${pn}" class="input-pn-cantidad" data-pn="${pn}" value="10" min="0">
            </div>
        `;
    });

    contenedor.innerHTML = htmlContenido;
}

function calcularNiveles() {
    const ordenes = parseFloat(document.getElementById("ordenesSemanales").value) || 0;
    const tiempoOrden = parseFloat(document.getElementById("tiempoPorOrden").value) || 0;
    const inputsCantidad = document.querySelectorAll(".input-pn-cantidad");
    const tablaCuerpo = document.getElementById("tablaCuerpo");
    
    if (inputsCantidad.length === 0) {
        alert("Por favor, seleccione una familia primero e ingrese cantidades.");
        return;
    }

    tablaCuerpo.innerHTML = "";

    // Cálculos de tiempo total estimado en manufactura
    const tiempoTotalProduccion = ordenes * tiempoOrden;
    const tiempoMinimoRequerido = 3 * tiempoOrden;
    const tiempoMaximoPermitido = 6 * tiempoOrden;

    inputsCantidad.forEach(input => {
        const pn = input.getAttribute("data-pn");
        const cantPorOrden = parseFloat(input.value) || 0;
        
        // FÓRMULAS APLICADAS:
        const demandaTotal = cantPorOrden * ordenes;
        const stockMinimo = cantPorOrden * 3; // Cobertura de seguridad para 3 órdenes
        const stockMaximo = cantPorOrden * 6; // Límite superior para 6 órdenes

        const fila = document.createElement("tr");
        fila.innerHTML = `
            <td style="text-align:left;"><b>${pn}</b></td>
            <td>${cantPorOrden}</td>
            <td><span style="font-weight:bold;">${demandaTotal}</span></td>
            <td><span class="badge-min">${stockMinimo}</span></td>
            <td><span class="badge-max">${stockMaximo}</span></td>
        `;
        tablaCuerpo.appendChild(fila);
    });

    // Actualizar textos informativos con tiempos y metas
    document.getElementById("resumenOrdenes").innerHTML = `Cálculo para un lote de <b>${ordenes} órdenes</b> programadas en la semana.`;
    document.getElementById("resumenTiempos").innerHTML = `
        ⏱️ Tiempo total estimado para producción: ${tiempoTotalProduccion} horas.<br>
        🚨 Ventana de Tiempo Mínima (3 órdenes): ${tiempoMinimoRequerido} horas de material.<br>
        📦 Capacidad Máxima de Amortiguación (6 órdenes): ${tiempoMaximoPermitido} horas de material.
    `;
    
    document.getElementById("resultados").style.display = "block";
}
</script>

</body>
</html>
