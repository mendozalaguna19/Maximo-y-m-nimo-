<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Inventario Avanzada</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="number"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .part-number-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            background: #f9f9f9;
            padding: 8px;
            border-radius: 4px;
            border-left: 4px solid #3498db;
        }
        .part-number-row label {
            margin-bottom: 0;
            flex: 1;
        }
        .part-number-row input {
            width: 120px;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background-color: #2980b9;
        }
        #resultados {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4f8;
            border-radius: 4px;
            display: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        table, th, td {
            border: 1px solid #bdc3c7;
        }
        th, td {
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #3498db;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Inventario por Familias</h2>
    
    <div class="form-group">
        <label for="ordenesSemanales">Cantidad de órdenes solicitadas (por semana/mes):</label>
        <input type="number" id="ordenesSemanales" value="10" min="0">
    </div>

    <div class="form-group">
        <label for="familiaSelect">Seleccione la Familia de Materiales:</label>
        <select id="familiaSelect" onchange="cargarPartNumbers()">
            <option value="">-- Seleccione una opción --</option>
            <option value="mirror">Mirror</option>
            </select>
    </div>

    <div id="contenedorPartNumbers"></div>

    <div class="form-group" style="margin-top: 20px;">
        <button type="button" onclick="calcularNiveles()">Calcular Niveles Totales</button>
    </div>

    <div id="resultados">
        <h3>Demanda Total Calculada</h3>
        <p id="resumenOrdenes"></p>
        <table>
            <thead>
                <tr>
                    <th>Part Number</th>
                    <th>Cant. por Orden</th>
                    <th>Demanda Total Req.</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo">
                </tbody>
        </table>
    </div>
</div>

<script>
// BASE DE DATOS MODIFICABLE: Aquí defines las familias y sus Part Numbers correspondientes
const baseDatosFamilias = {
    mirror: [
        "PN-01", "PN-02", "PN-03", "PN-04", "PN-05", 
        "PN-06", "PN-07", "PN-08", "PN-09", "PN-10", 
        "PN-11", "PN-12", "PN-13", "PN-14", "PN-15", 
        "PN-16", "PN-17"
    ]
    // Para agregar otra familia en el futuro, solo pones una coma arriba y escribes:
    // sensores: ["PN-S1", "PN-S2", "PN-S3"]
};

// Función que dibuja en pantalla los 17 inputs cuando seleccionas "Mirror"
function cargarPartNumbers() {
    const familiaSeleccionada = document.getElementById("familiaSelect").value;
    const contenedor = document.getElementById("contenedorPartNumbers");
    
    // Limpiar lo que haya antes
    contenedor.innerHTML = "";
    document.getElementById("resultados").style.display = "none";

    if (!familiaSeleccionada || !baseDatosFamilias[familiaSeleccionada]) return;

    const listaPN = baseDatosFamilias[familiaSeleccionada];
    
    let htmlContenido = `<h3>Componentes de la Familia: ${familiaSeleccionada.toUpperCase()}</h3>`;
    htmlContenido += `<p style="font-size:13px; color:#7f8c8d;">Ingrese la cantidad estándar que consume <b>UNA SOLA orden</b> para cada número de parte:</p>`;

    listaPN.forEach(pn => {
        htmlContenido += `
            <div class="part-number-row">
                <label for="input_${pn}">${pn}:</label>
                <input type="number" id="input_${pn}" class="input-pn-cantidad" data-pn="${pn}" value="100" min="0">
            </div>
        `;
    });

    contenedor.innerHTML = htmlContenido;
}

// Función que toma las órdenes, multiplica por la cantidad de cada PN y muestra la tabla final
function calcularNiveles() {
    const ordenes = parseFloat(document.getElementById("ordenesSemanales").value) || 0;
    const inputsCantidad = document.querySelectorAll(".input-pn-cantidad");
    const tablaCuerpo = document.getElementById("tablaCuerpo");
    
    if (inputsCantidad.length === 0) {
        alert("Por favor, seleccione una familia primero e ingrese cantidades.");
        return;
    }

    // Limpiar tabla previa
    tablaCuerpo.innerHTML = "";

    inputsCantidad.forEach(input => {
        const pn = input.getAttribute("data-pn");
        const cantPorOrden = parseFloat(input.value) || 0;
        const demandaTotal = cantPorOrden * ordenes; // Aquí se hace la multiplicación automática

        // Crear fila de resultado
        const fila = document.createElement("tr");
        fila.innerHTML = `
            <td><b>${pn}</b></td>
            <td>${cantPorOrden}</td>
            <td><mark style="background-color: #f1c40f; padding: 2px 5px; font-weight: bold;">${demandaTotal}</mark></td>
        `;
        tablaCuerpo.appendChild(fila);
    });

    // Mostrar sección de resultados
    document.getElementById("resumenOrdenes").innerText = `Cálculo realizado para un lote de ${ordenes} órdenes totales.`;
    document.getElementById("resultados").style.display = "block";
}
</script>

</body>
</html>
